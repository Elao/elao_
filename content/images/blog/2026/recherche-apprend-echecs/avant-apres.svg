<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 170" font-family="Inter, system-ui, sans-serif">
  <!-- AVANT -->
  <rect x="20" y="20" width="300" height="130" rx="10" fill="#fff" stroke="#e8e4da" stroke-width="1"/>
  <rect x="20" y="20" width="4" height="130" rx="2" fill="#E63946"/>
  <text x="44" y="52" font-size="11" font-weight="700" fill="#8a8a8a" letter-spacing="1">AVANT</text>
  <text x="44" y="82" font-size="15" font-weight="600" fill="#1a1a1a">« faire revenir les oignons »</text>
  <rect x="44" y="98" width="80" height="24" rx="12" fill="#fdf0f0" stroke="#f0b3b8" stroke-width="1"/>
  <text x="84" y="115" text-anchor="middle" font-size="11" font-weight="700" fill="#E63946">0 résultat</text>

  <!-- Arrow -->
  <line x1="340" y1="85" x2="410" y2="85" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8a8a8a"/>
    </marker>
  </defs>

  <!-- APRÈS -->
  <rect x="430" y="20" width="300" height="130" rx="10" fill="#fff" stroke="#e8e4da" stroke-width="1"/>
  <rect x="430" y="20" width="4" height="130" rx="2" fill="#2A9D8F"/>
  <text x="454" y="52" font-size="11" font-weight="700" fill="#8a8a8a" letter-spacing="1">APRÈS</text>
  <text x="454" y="82" font-size="15" font-weight="600" fill="#1a1a1a">« faire revenir les oignons »</text>
  <rect x="454" y="98" width="56" height="24" rx="12" fill="#edf7f6" stroke="#a3d5cf" stroke-width="1"/>
  <text x="482" y="115" text-anchor="middle" font-size="11" font-weight="700" fill="#2A9D8F">Suer</text>
  <text x="524" y="115" font-size="11" fill="#8a8a8a">— en premier résultat</text>
</svg>
