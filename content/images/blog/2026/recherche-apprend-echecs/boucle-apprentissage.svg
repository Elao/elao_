<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="Inter, system-ui, sans-serif">
  <!-- Block 1 — Capture (top left) -->
  <rect x="20" y="20" width="280" height="120" rx="10" fill="#fff" stroke="#e8e4da" stroke-width="1"/>
  <rect x="20" y="20" width="4" height="120" rx="2" fill="#E63946"/>
  <circle cx="52" cy="52" r="16" fill="#E63946"/>
  <text x="52" y="57" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">1</text>
  <text x="78" y="57" font-size="15" font-weight="700" fill="#1a1a1a">Capture</text>
  <text x="40" y="85" font-size="12" fill="#4a4a4a">L'utilisateur cherche « faire revenir</text>
  <text x="40" y="102" font-size="12" fill="#4a4a4a">les oignons ». Score trop bas →</text>
  <text x="40" y="119" font-size="12" font-weight="600" fill="#4a4a4a">journalisée automatiquement.</text>

  <!-- Arrow 1 → 2 -->
  <text x="350" y="85" text-anchor="middle" font-size="28" fill="#8a8a8a">→</text>

  <!-- Block 2 — Analyse IA (top right) -->
  <rect x="400" y="20" width="280" height="120" rx="10" fill="#fff" stroke="#e8e4da" stroke-width="1"/>
  <rect x="400" y="20" width="4" height="120" rx="2" fill="#457B9D"/>
  <circle cx="432" cy="52" r="16" fill="#457B9D"/>
  <text x="432" y="57" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">2</text>
  <text x="458" y="57" font-size="15" font-weight="700" fill="#1a1a1a">Analyse IA</text>
  <text x="420" y="85" font-size="12" fill="#4a4a4a">Un pipeline nocturne filtre,</text>
  <text x="420" y="102" font-size="12" fill="#4a4a4a">regroupe et génère des</text>
  <text x="420" y="119" font-size="12" font-weight="600" fill="#4a4a4a">suggestions de synonymes.</text>

  <!-- Arrow 2 → 3 (down) -->
  <text x="540" y="185" text-anchor="middle" font-size="28" fill="#8a8a8a">↓</text>

  <!-- Block 3 — Validation humaine (bottom right) -->
  <rect x="400" y="220" width="280" height="120" rx="10" fill="#fff" stroke="#e8e4da" stroke-width="1"/>
  <rect x="400" y="220" width="4" height="120" rx="2" fill="#F4A261"/>
  <circle cx="432" cy="252" r="16" fill="#F4A261"/>
  <text x="432" y="257" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">3</text>
  <text x="458" y="257" font-size="15" font-weight="700" fill="#1a1a1a">Validation humaine</text>
  <text x="420" y="285" font-size="12" fill="#4a4a4a">L'admin revoit chaque suggestion :</text>
  <text x="420" y="302" font-size="12" font-weight="600" fill="#4a4a4a">valider, rejeter ou réassigner.</text>

  <!-- Arrow 3 → 4 (left) -->
  <text x="350" y="285" text-anchor="middle" font-size="28" fill="#8a8a8a">←</text>

  <!-- Block 4 — Amélioration (bottom left) -->
  <rect x="20" y="220" width="280" height="120" rx="10" fill="#fff" stroke="#e8e4da" stroke-width="1"/>
  <rect x="20" y="220" width="4" height="120" rx="2" fill="#2A9D8F"/>
  <circle cx="52" cy="252" r="16" fill="#2A9D8F"/>
  <text x="52" y="257" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">4</text>
  <text x="78" y="257" font-size="15" font-weight="700" fill="#1a1a1a">Amélioration</text>
  <text x="40" y="285" font-size="12" fill="#4a4a4a">Le synonyme enrichit l'embedding →</text>
  <text x="40" y="302" font-size="12" fill="#4a4a4a">la prochaine recherche similaire</text>
  <text x="40" y="319" font-size="12" font-weight="600" fill="#4a4a4a">trouvera un résultat.</text>

  <!-- Arrow 4 → 1 (up) -->
  <text x="160" y="185" text-anchor="middle" font-size="28" fill="#8a8a8a">↑</text>

  <!-- Bottom label -->
  <text x="350" y="372" text-anchor="middle" font-size="12" font-style="italic" fill="#8a8a8a">↻ La boucle tourne en continu, chaque nuit</text>
</svg>
